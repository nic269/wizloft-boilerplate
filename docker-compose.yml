services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: personal_saas_boilerplate
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personal_saas_boilerplate"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
